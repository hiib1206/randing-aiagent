<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- deploy-id: 2026-03-23T05:18:52Z -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test 1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      z-index: 0;
    }

    .glow-1 {
      top: -100px;
      left: -100px;
      background: #f97316;
    }

    .glow-2 {
      bottom: -100px;
      right: -100px;
      background: #06b6d4;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 20px;
    }

    .hero {
      text-align: center;
      animation: slideIn 0.7s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #a3a3a3;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    h1 span {
      background: linear-gradient(90deg, #f97316, #fb923c, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .desc {
      font-size: 1.1rem;
      color: #737373;
      max-width: 460px;
      line-height: 1.7;
      margin: 0 auto 32px;
    }

    .btn-group {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f97316, #fb923c);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(249, 115, 22, 0.35);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #d4d4d4;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 700px;
      width: 100%;
      animation: slideIn 0.9s ease-out;
    }

    .info-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      transition: border-color 0.3s, background 0.3s;
    }

    .info-card:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
    }

    .info-card .num {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
    }

    .info-card .label {
      font-size: 0.85rem;
      color: #737373;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .cards { grid-template-columns: 1fr; max-width: 300px; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="container">
    <div class="hero">
      <div class="badge">v1.0 Beta</div>
      <h1>Build Something<br><span>Amazing</span></h1>
      <p class="desc">모던하고 깔끔한 다크 테마 랜딩 페이지입니다.<br>자유롭게 커스터마이즈 해보세요.</p>
      <div class="btn-group">
        <a href="#" class="btn btn-primary">Get Started</a>
        <a href="#" class="btn btn-secondary">Learn More</a>
      </div>
    </div>

    <div class="cards">
      <div class="info-card">
        <div class="num">99%</div>
        <div class="label">Uptime</div>
      </div>
      <div class="info-card">
        <div class="num">10K+</div>
        <div class="label">Users</div>
      </div>
      <div class="info-card">
        <div class="num">50+</div>
        <div class="label">Features</div>
      </div>
    </div>
  </div>
</body>
</html>
