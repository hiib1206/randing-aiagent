<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test4 Page</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0f0f1a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .container {
        text-align: center;
        z-index: 1;
      }

      .container h1 {
        font-size: 3rem;
        background: linear-gradient(90deg, #f093fb, #f5576c, #4facfe);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 3s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }

      .container p {
        color: rgba(255, 255, 255, 0.7);
        font-size: 1.2rem;
        margin-bottom: 40px;
      }

      .buttons {
        display: flex;
        gap: 16px;
        justify-content: center;
      }

      .btn {
        padding: 14px 36px;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s;
      }

      .btn-primary {
        background: linear-gradient(135deg, #f093fb, #f5576c);
        color: #fff;
      }

      .btn-primary:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(245, 87, 108, 0.5);
      }

      .btn-outline {
        background: transparent;
        color: #fff;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .btn-outline:hover {
        border-color: #fff;
        transform: scale(1.05);
      }

      .circles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .circle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.15;
        animation: float 6s ease-in-out infinite;
      }

      .circle:nth-child(1) {
        width: 300px;
        height: 300px;
        background: #f5576c;
        top: -50px;
        right: -80px;
        animation-delay: 0s;
      }

      .circle:nth-child(2) {
        width: 200px;
        height: 200px;
        background: #4facfe;
        bottom: -40px;
        left: -60px;
        animation-delay: 2s;
      }

      .circle:nth-child(3) {
        width: 150px;
        height: 150px;
        background: #f093fb;
        top: 40%;
        left: 60%;
        animation-delay: 4s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-30px);
        }
      }
    </style>
  </head>
  <body>
    <div class="circles">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>
    <div class="container">
      <h1>테스트4 페이지</h1>
      <p>다크 테마의 모던한 테스트 페이지입니다.</p>
      <div class="buttons">
        <a href="#" class="btn btn-primary">시작하기</a>
        <a href="#" class="btn btn-outline">더 알아보기</a>
      </div>
    </div>
  </body>
</html>
