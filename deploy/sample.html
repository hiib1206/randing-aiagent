<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- deploy-id: 2026-03-23T20:17:32+09:00 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투노인베스트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Apple SD Gothic Neo', sans-serif; color: #333; }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
    .hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    .hero p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem; max-width: 500px; }
    .btn {
      padding: 14px 40px;
      background: #fff;
      color: #764ba2;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>더 나은 투자의 시작</h1>
    <p>당신의 자산을 스마트하게 관리하세요. 간편하고 안전한 투자 플랫폼.</p>
    <a href="#" class="btn">시작하기</a>
  </section>
</body>
</html>
